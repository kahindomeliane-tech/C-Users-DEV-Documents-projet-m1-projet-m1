<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mini Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-box">
    <h2>🔑 Connexion</h2>

    <input type="text" id="username" placeholder="Nom d'utilisateur">
    <input type="password" id="password" placeholder="Mot de passe">
    <input type="password" id="pin" placeholder="PIN de sécurité">

    <button onclick="login()">Se connecter</button>

    <p>
        Pas de compte ?
        <a href="register.html">Inscription</a>
    </p>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const pin = document.getElementById("pin").value.trim();

    if (!username || !password || !pin) {
        alert("Veuillez remplir tous les champs (nom, mot de passe et PIN).");
        return;
    }

    const response = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const result = await response.json();

    if (result.success) {
        // Stockage du username, du rôle et du PIN
        localStorage.setItem("username", username);
        localStorage.setItem("role", result.role || "user");
        localStorage.setItem("pin", pin);

        window.location = "chat.html";
    } else {
        alert(result.message || "Identifiants incorrects");
    }
}
</script>

</body>
</html>

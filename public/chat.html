<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #628bb4; }
        .chat-container {
            max-width: 680px;
            margin: 40px auto;
            border: 1px solid #0c556d;
            border-radius: 8px;
            background: #191717;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #555d6a;
            color: #e9d9d9;
            padding: 15px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header button {
            background: #4d867a;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .header button:hover { background: #007f67; }
        #messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ded1f8;
        }
        .message { margin: 5px 0; }
        .system { color: #ebeff3; font-style: italic; }
        .bottom {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .emoji-bar {
            display: flex;
            gap: 5px;
            padding: 10px;
            border-top: 1px solid #ceb0b0;
            background: #706666;
        }
        .emoji-bar button {
            font-size: 20px;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .emoji-bar button:hover { transform: scale(1.2); }
        .admin-panel {
            display: none;
            background: #222;
            border-top: 1px solid #4a4a4a;
            padding: 12px;
            max-height: 320px;
            overflow-y: auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #fff;
        }
        .admin-header button {
            background: #b73f3f;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            color: #fff;
            cursor: pointer;
        }
        .admin-messages {
            max-height: 240px;
            overflow-y: auto;
            background: #181818;
            padding: 10px;
            border-radius: 6px;
            color: #eee;
        }
        .admin-message {
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        .admin-system {
            color: #b9d1ff;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <span>💬 Chat WhatsApp</span>
        <div>
            <button id="adminToggle" onclick="showAdminPanel()" style="display:none; margin-right: 10px;">Admin</button>
            <button onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div id="messages"></div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <span>📋 Interface Admin</span>
            <button onclick="hideAdminPanel()">Fermer</button>
        </div>
        <div id="adminMessages" class="admin-messages"></div>
    </div>

    <div class="bottom">
        <select id="group" class="form-select" aria-label="Choisir un groupe">
            <option value="Groupe1">Groupe 1</option>
            <option value="Groupe2">Groupe 2</option>
            <option value="Groupe3">Groupe 3</option>
            <option value="Groupe4">Groupe 4</option>
            <option value="Groupe5">Groupe 5</option>
        </select>
        <input type="text" id="messageInput" class="form-control" placeholder="Message">
        <button class="btn btn-success" onclick="sendMessage()">Envoyer</button>
        <button class="btn btn-info" onclick="setDecryptKey()">Clé</button>
        <input type="file" id="fileInput" class="form-control">
        <button class="btn btn-warning" onclick="uploadFile()">Partager fichier</button>
    </div>

    <div class="emoji-bar">
        <button onclick="addEmoji('😂')">😂</button>
        <button onclick="addEmoji('❤️')">❤️</button>
        <button onclick="addEmoji('👍')">👍</button>
        <button onclick="addEmoji('🔥')">🔥</button>
        <button onclick="addEmoji('🎉')">🎉</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>

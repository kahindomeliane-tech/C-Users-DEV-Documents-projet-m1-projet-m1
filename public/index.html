<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mini Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #628bb4; }
        .chat-container {
            max-width: 600px;
            margin: 40px auto;
            border: 1px solid #0c556d;
            border-radius: 8px;
            background: #f8ebeb;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #555d6a;
            color: #f3ebeb;
            padding: 15px;
            font-size: 20px;
            display: flex;
            justify-content: space-between; /* permet d’avoir le bouton à droite */
            align-items: center;
        }
        .header button {
            background: #00a884;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .header button:hover {
            background: #007f67;
        }
        #messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ded1f8;
        }
        .message { margin: 5px 0; }
        .system { color: #ebeff3; font-style: italic; }
        .bottom {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .emoji-bar {
            display: flex;
            gap: 5px;
            padding: 10px;
            border-top: 1px solid #ceb0b0;
            background: #706666;
        }
        .emoji-bar button {
            font-size: 20px;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .emoji-bar button:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div class="chat-container">

    <!-- Barre du haut avec bouton Déconnexion -->
    <div class="header">
        <span>💬 Chat WhatsApp</span>
        <button onclick="logout()">Déconnexion</button>
    </div> 

    <div id="messages"></div>

    <div class="bottom">
        <input type="text" id="username" class="form-control" placeholder="Votre nom">
        <select id="group" class="form-select">
            <option value="Groupe1">Groupe 1</option>
            <option value="Groupe2">Groupe 2</option>
            <option value="Groupe3">Groupe 3</option>
            <option value="Groupe4">Groupe 4</option>
            <option value="Groupe5">Groupe 5</option>
        </select>
        <input type="text" id="messageInput" class="form-control" placeholder="Message">
        <button class="btn btn-success" onclick="sendMessage()">Envoyer</button>
        <input type="file" id="fileInput" class="form-control">
        <button class="btn btn-warning" onclick="uploadFile()">Partager fichier</button>
    </div>

    <!-- Barre d'émojis -->
    <div class="emoji-bar">
        <button onclick="addEmoji('😂')">😂</button>
        <button onclick="addEmoji('❤️')">❤️</button>
        <button onclick="addEmoji('👍')">👍</button>
        <button onclick="addEmoji('🔥')">🔥</button>
        <button onclick="addEmoji('🎉')">🎉</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
<script>
function logout() {
    localStorage.removeItem("username");
    window.location = "login.html";
}
</script>

</body>
</html>
